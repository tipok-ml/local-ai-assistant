version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    network_mode: host
    volumes:
      - open-webui:/app/backend/data
    environment:
      - HF_ENDPOINT=https://hf-mirror.com   # зеркало для загрузки моделей (ускоряет в РФ)

volumes:
  open-webui:
